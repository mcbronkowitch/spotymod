name: build-plugin

# Builds the Spotymod VCV Rack plugin for every platform Rack ships, using the
# same host/vcv Makefile that builds it locally on Windows. Each job downloads
# the matching Rack SDK, compiles with the runner's native toolchain (which is
# what plugin.mk's arch.mk keys off via `$(CC) -dumpmachine`), and uploads the
# resulting `.vcvplugin`. On a version tag (v*) the artifacts are also attached
# to a GitHub Release for direct download.

# Not on every push: this fans out to four runners (two of them macOS, billed
# at 10x), so a docs or scenario commit shouldn't trigger a full plugin build.
# Runs only on demand (Actions tab -> Run workflow) and on a version tag, which
# is also what produces the downloadable Release.
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  RACK_SDK_VERSION: "2.6.6"

jobs:
  build:
    name: ${{ matrix.sdk }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - sdk: mac-arm64
            runner: macos-14
          - sdk: win-x64
            runner: windows-latest
          - sdk: lin-x64
            runner: ubuntu-latest
          # mac-x64 (Intel) dropped: GitHub's macos-13 runner queue stalls builds
          # for ages and Apple Silicon covers current Macs. Re-add a
          # `{ sdk: mac-x64, runner: macos-13 }` entry here if Intel is needed.
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # ---- toolchains + make/dist helpers (jq, zstd, tar, strip) --------------
      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install jq zstd

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y jq zstd

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          # WinLibs-equivalent mingw gcc + the POSIX make/unzip/curl/zstd/tar/jq
          # the SDK's plugin.mk `dist` target shells out to (matches the local
          # MSYS2 + WinLibs setup this plugin is normally built with).
          install: >-
            make
            unzip
            curl
            tar
            zstd
            jq
            mingw-w64-x86_64-gcc

      # ---- build (one shell per OS so paths/toolchain stay consistent) -------
      - name: Build (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          curl -L -o rack-sdk.zip "https://vcvrack.com/downloads/Rack-SDK-${{ env.RACK_SDK_VERSION }}-${{ matrix.sdk }}.zip"
          unzip -q rack-sdk.zip -d "$HOME"
          make -C host/vcv -j"$(getconf _NPROCESSORS_ONLN)" dist RACK_DIR="$HOME/Rack-SDK"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          curl -L -o rack-sdk.zip "https://vcvrack.com/downloads/Rack-SDK-${{ env.RACK_SDK_VERSION }}-${{ matrix.sdk }}.zip"
          unzip -q rack-sdk.zip -d "$HOME"
          make -C host/vcv -j"$(nproc)" dist RACK_DIR="$HOME/Rack-SDK" CC=gcc CXX=g++

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Spotymod-${{ matrix.sdk }}
          path: host/vcv/dist/*.vcvplugin
          if-no-files-found: error

  # ---- attach all platform builds to a Release when a v* tag is pushed -------
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.vcvplugin
          fail_on_unmatched_files: true
